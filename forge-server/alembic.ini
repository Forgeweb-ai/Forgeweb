# Alembic config for forge-server.
#
# Migrations live in alembic/versions/. Run via:
#   alembic upgrade head
# (dev.sh runs this automatically before starting forge-server.)
#
# The actual database URL is loaded from forge_server.config at runtime
# (see alembic/env.py). The `sqlalchemy.url` setting below is intentionally
# blank — env.py overrides it.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# Migration filenames: 0001_initial_schema.py, 0002_..., etc.
# Sequential prefix keeps them sorted in any file browser.
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
