services:
  traefik:
    image: traefik:v3.0
    container_name: forge-traefik
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=forge-net
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Traefik dashboard (internal only in prod)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
      - traefik-certs:/certs
    networks:
      - forge-net

  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forgedev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - forge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  opencode:
    build:
      context: ./opencode
      dockerfile: Dockerfile.forge
    container_name: forge-opencode
    restart: unless-stopped
    # DO NOT add `env_file: .env` here. Opencode hosts the agent's shell/exec
    # tools; any var in process.env is one `env` call away from the model.
    # The .env file holds FORGE_INTERNAL_SECRET, POSTGRES_PASSWORD, and the
    # platform's *_API_KEY values — none of which the agent (or any code it
    # writes) should ever see. Per-user keys arrive on the X-Forge-Auth
    # header and are scoped to a single provider request by the resolver.
    # If a new platform-side env is genuinely needed by opencode itself,
    # add it as an explicit named entry below — never via env_file.
    working_dir: /opencode
    # Run the vendored fork from source under bun. The npm package
    # opencode-ai@latest does NOT include the Forge Phase 2 patches
    # (Auth.ForgeMode + forge-auth middleware + per-request key suppression);
    # using it would silently fall back to the shared auth.json / env-var
    # behaviour and re-leak platform keys to every Forge user.
    #
    # --print-logs is required so opencode's logger writes to stderr instead
    # of a file inside the container — without it, `docker compose logs
    # opencode` only ever shows startup output and every handler exception
    # is invisible. See packages/opencode/src/index.ts:96 (Log.init).
    command: ["bun", "run", "--conditions=browser", "packages/opencode/src/index.ts", "serve", "--port", "7777", "--hostname", "0.0.0.0", "--print-logs"]
    volumes:
      # Use ${FORGE_DATA_ROOT:-./forge-data}. On macOS the bare `/forge-data`
      # path is not in Docker Desktop's shared-paths list, so the mount is
      # denied; the relative default resolves to ./forge-data (next to this
      # file) which IS shared via /Users. In prod, set FORGE_DATA_ROOT=/forge-data.
      - ${FORGE_DATA_ROOT:-./forge-data}:/forge-data
      # Shared platform skills — single source of truth for every project's
      # opencode session. Read-only so a runaway agent can't mutate them.
      # Picked up automatically because the global opencode.json below sets
      # skills.paths = ["/forge-skills"].
      - ./forge-server/forge_server/skills:/forge-skills:ro
      # Platform-level opencode config (skills.paths, subagent definitions,
      # global instructions). Lives in opencode's xdgConfig directory, which
      # is /root/.config/opencode inside the container. Loaded BEFORE any
      # per-project .opencode/opencode.json, so every project inherits it.
      # See: opencode/packages/core/src/global.ts (xdgConfig + "opencode")
      #
      # Mounted READ-WRITE because opencode's Config.loadInstanceState writes
      # a managed .gitignore (and other instance-state files) into this dir
      # at every startup. A :ro mount causes EROFS during bootstrap which
      # makes every API request return 500 UnknownError. The repo-level
      # .gitignore ignores opencode-generated files in this folder so they
      # don't pollute `git status`.
      - ./forge-opencode-config:/root/.config/opencode
      # Opencode's sqlite session/state DB lives here. Without a volume,
      # every container recreate (compose down/up, force-recreate) wipes
      # every session and the FE shows "Session not found" on the next
      # prompt. Named volume persists across the container lifecycle.
      - opencode-data:/root/.local/share/opencode
    networks:
      - forge-net
    environment:
      # NO platform LLM keys here. Forge is BYOK at the user layer:
      # provider keys live in user_provider_keys (Fernet-encrypted) and are
      # injected per-request by the resolver (forge-server opencode_proxy +
      # opencode's ForgeMode middleware). Default model is opencode zen's
      # free DeepSeek V4 Flash, which needs no key at all. Wiring env keys
      # here would re-introduce the platform-key leak path we removed.
      #
      # opencode.json's {env:MOONSHOT_API_KEY} / {env:GOOGLE_API_KEY}
      # placeholders resolve to empty strings — the resolver overrides
      # them on every authenticated user request.
      #
      # Route Anthropic traffic through the logging proxy so every request
      # is auditable in forge-llm-proxy-logs/, regardless of which user
      # owns the key being injected.
      - ANTHROPIC_BASE_URL=http://forge-llm-proxy:7799
      # Shared HMAC secret between forge-server's opencode_proxy and the
      # forge-user middleware in opencode. Both processes MUST see the same
      # value or opencode rejects every forge-server-signed request, the
      # model resolver falls back to nothing, and the UI shows "No model
      # results". dev.sh sets the same default; we mirror it here so a
      # plain `docker compose up` works out of the box.
      - FORGE_INTERNAL_SECRET=${FORGE_INTERNAL_SECRET:-dev-only-internal-secret-do-not-ship}
      # Where opencode's resolver calls back into forge-server. Docker DNS
      # resolves `forge-server` to the service IP on forge-net.
      - FORGE_API_URL=http://forge-server:8000
      # Default model the opencode fork hands new sessions when no per-user
      # model is set. Matches the value dev.sh exports — the free opencode
      # zen DeepSeek model needs no key, so a fresh sign-up has a working
      # default in the model picker.
      - PRIMARY_MODEL=${PRIMARY_MODEL:-opencode/deepseek-v4-flash-free}
      # Design subagent's model. dev.sh defaults to anthropic/claude-sonnet-4-6;
      # the .env on disk also sets this so the env_file pulls in a real value.
      - DESIGN_ANALYST_MODEL=${DESIGN_ANALYST_MODEL:-anthropic/claude-sonnet-4-6}
      # opencode's Dockerfile bakes NODE_ENV=production; in that mode the
      # framework swallows handler stack traces and returns the generic
      # `UnknownError` with only a ref code. Override to development so the
      # real error surfaces in `docker compose logs opencode`. Production-
      # grade deploys should remove this line.
      - NODE_ENV=development
    depends_on:
      - forge-llm-proxy
    # NOT exposed to internet — only forge-be communicates with it

  forge-server:
    build:
      context: ./forge-server
      dockerfile: Dockerfile
    container_name: forge-server
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://forge:${POSTGRES_PASSWORD:-forgedev}@postgres:5432/forge
      - OPENCODE_URL=http://opencode:7777
      - FORGE_DATA_ROOT=/forge-data
      # HOST path of forge-data — used ONLY when forge-server tells the
      # docker daemon to bind-mount the workspace into a project container.
      # The daemon resolves bind sources on the host FS, not inside
      # forge-server's container, so passing /forge-data (the in-container
      # path) makes the mount fail on macOS Docker Desktop and the project
      # container stays stuck in Created. ${PWD} expands at compose-up time
      # to the directory where `docker compose up` was run.
      - FORGE_DATA_ROOT_HOST=${FORGE_DATA_ROOT_HOST:-${PWD}/forge-data}
      # Traefik routes *.${PREVIEW_DOMAIN} to project containers via Docker labels.
      # Local: preview.lvh.me (wildcard-resolves to 127.0.0.1, no DNS setup).
      # Prod:  preview.forge.com (real wildcard DNS).
      - PREVIEW_DOMAIN=${PREVIEW_DOMAIN:-preview.lvh.me}
      - PREVIEW_SCHEME=${PREVIEW_SCHEME:-http}
      - DOCKER_NETWORK=forge-net
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - REDIS_URL=redis://redis:6379/0
      # Sleep settings
      - SLEEP_CHECK_INTERVAL=60
      - IDLE_TTL=600
      # Shared HMAC secret — must match opencode's value above. See the
      # comment on the opencode service for why this matters.
      - FORGE_INTERNAL_SECRET=${FORGE_INTERNAL_SECRET:-dev-only-internal-secret-do-not-ship}
      # dev.sh sets this; it unlocks dev-mode-only auth / feature gates the
      # app needs locally (skips strict prod checks for an unsigned origin,
      # etc.). Mirrors the exact value dev.sh exports right before uvicorn.
      - DEV_MODE=true
    volumes:
      - ${FORGE_DATA_ROOT:-./forge-data}:/forge-data
      - /var/run/docker.sock:/var/run/docker.sock   # manages project containers
    networks:
      - forge-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.forge-server.rule=Host(`${API_DOMAIN:-api.forge.localhost}`)
      - traefik.http.routers.forge-server.entrypoints=web
      - traefik.http.services.forge-server.loadbalancer.server.port=8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opencode:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    networks:
      - forge-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Logging proxy between opencode and Anthropic. Every /v1/messages call lands
  # here first; we log request + response, then forward to api.anthropic.com.
  # Lets us verify subagent invocations (e.g. design-analyst) and inspect what
  # prompts opencode is actually sending. opencode's provider config below
  # sets baseURL to point here.
  forge-llm-proxy:
    build:
      context: ./forge-llm-proxy
      dockerfile: Dockerfile
    container_name: forge-llm-proxy
    restart: unless-stopped
    environment:
      - ANTHROPIC_UPSTREAM=https://api.anthropic.com
      - FORGE_LLM_PROXY_LOG_DIR=/logs
      - FORGE_QA_PATH=/forge-qa
      - PORT=7799
      # Idle-token watchdog for streaming responses. If upstream goes silent
      # for this many seconds, the proxy aborts the stream and emits a
      # vendor-agnostic terminator so opencode unblocks. Without this, a
      # stalled provider freezes the UI on "Thinking…" until something kills
      # the TCP socket. Tune down once we have telemetry on legitimate gaps.
      - FORGE_LLM_PROXY_IDLE_TIMEOUT=${FORGE_LLM_PROXY_IDLE_TIMEOUT:-45}
    volumes:
      # Logs visible on the host at ./forge-llm-proxy-logs/
      - ./forge-llm-proxy-logs:/logs
      # Rate card + cost computer — same files the harness and dashboard read.
      # Read-only; the proxy is not allowed to mutate pricing data.
      - ./forge-qa:/forge-qa:ro
    networks:
      - forge-net
    # NOT exposed to internet — opencode talks to it on the internal network

  forge-fe:
    # Build context is the REPO ROOT, not ./forge-ui, because forge-ui is a
    # bun workspace member of opencode/ and resolves workspace:* + catalog:
    # deps through it. See forge-ui/Dockerfile for the full reasoning.
    build:
      context: .
      dockerfile: forge-ui/Dockerfile
      args:
        # Vite inlines VITE_* at BUILD time. Pass them as build args, not
        # runtime env, or the bundle ships with the dev defaults.
        VITE_API_URL: ${API_URL:-http://api.forge.localhost}
        VITE_PREVIEW_DOMAIN: ${PREVIEW_DOMAIN:-preview.lvh.me}
        VITE_OPENCODE_URL: ${OPENCODE_URL:-http://opencode:7777}
    container_name: forge-fe
    restart: unless-stopped
    networks:
      - forge-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.forge-fe.rule=Host(`${APP_DOMAIN:-app.forge.localhost}`)
      - traefik.http.routers.forge-fe.entrypoints=web
      - traefik.http.services.forge-fe.loadbalancer.server.port=3000
    depends_on:
      - forge-server

networks:
  forge-net:
    # Pinned name so project containers (started later by forge-server) can
    # `--network forge-net` regardless of the compose project name. Compose
    # creates and owns it; we don't require the user to run `docker network
    # create` before `up`.
    name: forge-net
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  traefik-certs:
  # Opencode's sqlite DB (sessions, instance state). Survives
  # docker compose down/up so the FE doesn't lose its active session
  # every restart.
  opencode-data:
